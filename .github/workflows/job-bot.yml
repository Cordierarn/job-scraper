name: Job alerts bot

on:
  schedule:
    # Toutes les 4 heures UTC. Ajuste si tu veux décaler.
    - cron: "0 */4 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: job-bot
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Restore seen.json from Actions cache
        # Clé unique par run pour forcer la sauvegarde post-job ;
        # restore-keys récupère le dernier cache existant pour ce workflow.
        uses: actions/cache@v4
        with:
          path: data/seen.json
          key: job-bot-seen-${{ github.run_id }}
          restore-keys: |
            job-bot-seen-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scan
        env:
          FRANCE_TRAVAIL_CLIENT_ID: ${{ secrets.FRANCE_TRAVAIL_CLIENT_ID }}
          FRANCE_TRAVAIL_CLIENT_SECRET: ${{ secrets.FRANCE_TRAVAIL_CLIENT_SECRET }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m bot.main once
