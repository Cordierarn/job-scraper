name: Job alerts bot

on:
  schedule:
    # Toutes les 4 heures UTC. Ajuste si tu veux décaler.
    - cron: "0 */4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: job-bot
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # On a besoin du commit history pour push ; pas la peine de tout fetch.
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scan
        env:
          FRANCE_TRAVAIL_CLIENT_ID: ${{ secrets.FRANCE_TRAVAIL_CLIENT_ID }}
          FRANCE_TRAVAIL_CLIENT_SECRET: ${{ secrets.FRANCE_TRAVAIL_CLIENT_SECRET }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m bot.main once

      - name: Commit updated seen.json
        run: |
          git config user.name  "job-scraper-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seen.json || true
          if git diff --staged --quiet; then
            echo "Pas de mise à jour de seen.json."
          else
            git commit -m "chore(bot): refresh seen offers [skip ci]"
            git push
          fi
