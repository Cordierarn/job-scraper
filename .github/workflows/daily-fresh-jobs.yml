name: Daily fresh jobs (18h Paris)

on:
  schedule:
    # Paris bascule entre UTC+1 (hiver) et UTC+2 (été). On programme les deux
    # créneaux possibles ; un check Paris-time ne laisse passer que celui qui
    # correspond à 18h locale.
    - cron: "0 16 * * *"  # 18h Paris en été (CEST)
    - cron: "0 17 * * *"  # 18h Paris en hiver (CET)
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: daily-fresh-jobs
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Gate — n'exécute que si l'heure de Paris est 18h
        id: gate
        env:
          TZ: Europe/Paris
        run: |
          paris_hour=$(date +%H)
          echo "Heure Paris : ${paris_hour}h"
          if [ "$paris_hour" = "18" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skip — pas 18h à Paris."
          fi

      - name: Checkout
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Restore seen_daily.json from Actions cache
        if: steps.gate.outputs.run == 'true'
        uses: actions/cache@v4
        with:
          path: data/seen_daily.json
          key: daily-fresh-seen-${{ github.run_id }}
          restore-keys: |
            daily-fresh-seen-

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily fresh scan
        if: steps.gate.outputs.run == 'true'
        env:
          FRANCE_TRAVAIL_CLIENT_ID: ${{ secrets.FRANCE_TRAVAIL_CLIENT_ID }}
          FRANCE_TRAVAIL_CLIENT_SECRET: ${{ secrets.FRANCE_TRAVAIL_CLIENT_SECRET }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -m bot.main once \
            --alerts-file alerts_daily.json \
            --state-file data/seen_daily.json
